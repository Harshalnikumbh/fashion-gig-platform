<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — AtelierX</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="auth-body">

  <div class="auth-split">

    <!-- LEFT PANEL -->
    <div class="auth-left">
      <a href="/" class="auth-brand">
        <svg viewBox="0 0 160 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="height:36px">
          <circle cx="12" cy="20" r="7" stroke="#C9A96E" stroke-width="1.5" fill="none"/>
          <circle cx="12" cy="20" r="2" fill="#C9A96E"/>
          <path d="M19 14 Q34 4 28 28 Q24 38 38 32" stroke="#C9A96E" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <text x="44" y="26" font-family="'Cormorant Garamond', serif" font-size="22" font-weight="300" letter-spacing="3" fill="#fff">ATELIER<tspan font-weight="600" fill="#C9A96E">X</tspan></text>
        </svg>
      </a>
      <div class="auth-left-content">
        <h2>Welcome<br/><em>Back</em></h2>
        <p>Your runway awaits. Sign in to continue creating, learning, and growing.</p>
        <div class="auth-illustration">
          <svg viewBox="0 0 260 300" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Abstract sewing ring / hoop -->
            <circle cx="130" cy="150" r="100" stroke="#C9A96E" stroke-width="1" opacity="0.3"/>
            <circle cx="130" cy="150" r="70" stroke="#C9A96E" stroke-width="1" opacity="0.5" stroke-dasharray="10,8"/>
            <circle cx="130" cy="150" r="40" stroke="#C9A96E" stroke-width="1.2" fill="rgba(201,169,110,0.06)"/>
            <!-- Needle through hoop -->
            <line x1="90" y1="90" x2="175" y2="210" stroke="#C9A96E" stroke-width="2" stroke-linecap="round"/>
            <ellipse cx="88" cy="88" rx="6" ry="4" transform="rotate(-40 88 88)" stroke="#C9A96E" stroke-width="1.5" fill="none"/>
            <!-- Thread waves -->
            <path d="M175 210 Q185 225 175 240 Q165 255 180 265" stroke="#C9A96E" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.7"/>
            <!-- Stars -->
            <circle cx="60" cy="60" r="2" fill="#C9A96E" opacity="0.6"/>
            <circle cx="200" cy="80" r="1.5" fill="#C9A96E" opacity="0.4"/>
            <circle cx="180" cy="240" r="2" fill="#C9A96E" opacity="0.5"/>
            <circle cx="50" cy="200" r="1.5" fill="#C9A96E" opacity="0.4"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="auth-right">
      <div class="auth-form-wrap">
        <h1>Sign In</h1>
        <p class="auth-sub">New here? <a href="/signup">Create a free account →</a></p>

        <form class="auth-form" id="signinForm" action="#" method="POST">

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="you@example.com" required/>
          </div>

          <div class="form-group">
            <label>
              Password
              <a href="#" class="forgot-link">Forgot password?</a>
            </label>
            <div class="input-pw">
              <input type="password" name="password" id="pw" placeholder="Your password" required/>
              <button type="button" class="pw-toggle" onclick="togglePw('pw','eyePw')"><span id="eyePw">👁</span></button>
            </div>
          </div>

          <label class="checkbox-label">
            <input type="checkbox" name="remember"/> Remember me for 30 days
          </label>

          <button type="submit" class="btn-submit">Sign In →</button>
        </form>

        <div class="auth-divider"><span>or continue with</span></div>
        <div class="social-btns">
          <button class="social-btn">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button class="social-btn">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Facebook
          </button>
        </div>

        <p class="auth-bottom">By signing in, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>
      </div>
    </div>

  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
