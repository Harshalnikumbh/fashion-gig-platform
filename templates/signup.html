<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — AtelierX</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body class="auth-body">

  <div class="auth-split">

    <!-- LEFT PANEL -->
    <div class="auth-left">
      <a href="/" class="auth-brand">
        <svg viewBox="0 0 160 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="height:36px">
          <circle cx="12" cy="20" r="7" stroke="#C9A96E" stroke-width="1.5" fill="none"/>
          <circle cx="12" cy="20" r="2" fill="#C9A96E"/>
          <path d="M19 14 Q34 4 28 28 Q24 38 38 32" stroke="#C9A96E" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <text x="44" y="26" font-family="'Cormorant Garamond', serif" font-size="22" font-weight="300" letter-spacing="3" fill="#fff">ATELIER<tspan font-weight="600" fill="#C9A96E">X</tspan></text>
        </svg>
      </a>
      <div class="auth-left-content">
        <h2>Begin Your<br/><em>Fashion Story</em></h2>
        <p>Join a community of designers, learners, and fashion visionaries.</p>
        <div class="auth-illustration">
          <svg viewBox="0 0 260 320" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Stylized mannequin + dress -->
            <circle cx="130" cy="48" r="28" stroke="#C9A96E" stroke-width="1.2" fill="none"/>
            <path d="M110 76 Q100 100 85 120 L70 260 H190 L175 120 Q160 100 150 76Z" fill="rgba(201,169,110,0.1)" stroke="#C9A96E" stroke-width="1"/>
            <path d="M100 78 Q130 100 160 78" stroke="#C9A96E" stroke-width="1" fill="rgba(201,169,110,0.15)"/>
            <line x1="130" y1="76" x2="130" y2="140" stroke="#C9A96E" stroke-width="0.8" stroke-dasharray="4,3"/>
            <!-- Waist -->
            <ellipse cx="130" cy="160" rx="35" ry="6" stroke="#C9A96E" stroke-width="0.8" fill="none" opacity="0.6"/>
            <!-- Hem decoration -->
            <path d="M72 258 Q100 245 130 258 Q160 271 188 258" stroke="#C9A96E" stroke-width="1" fill="none"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="auth-right">
      <div class="auth-form-wrap">
        <h1>Create Account</h1>
        <p class="auth-sub">Already have an account? <a href="/signin">Sign in →</a></p>

        <!-- ROLE TOGGLE -->
        <div class="role-toggle" id="roleToggle">
          <button class="role-btn active" data-role="learner" onclick="selectRole(this, 'learner')">
            🌸 I'm a Learner
          </button>
          <button class="role-btn" data-role="creator" onclick="selectRole(this, 'creator')">
            ✂️ I'm a Creator
          </button>
        </div>
        <p class="role-desc" id="roleDesc">Access courses, browse gigs & build your fashion career.</p>

        <form class="auth-form" id="signupForm" action="#" method="POST">
          <input type="hidden" name="role" id="roleInput" value="learner"/>

          <div class="form-row two-col">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" name="first_name" placeholder="Sanjivani" required/>
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" name="last_name" placeholder="Sharma" required/>
            </div>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="you@example.com" required/>
          </div>

          <!-- Creator extra field -->
          <div class="form-group creator-only hidden" id="specialityField">
            <label>Your Speciality</label>
            <select name="speciality">
              <option value="">Select your niche...</option>
              <option>Bridal & Wedding</option>
              <option>Haute Couture</option>
              <option>Streetwear & Urban</option>
              <option>Pattern Making</option>
              <option>Fashion Illustration</option>
              <option>Sustainable Fashion</option>
              <option>Accessories Design</option>
            </select>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="input-pw">
              <input type="password" name="password" id="pw" placeholder="Min. 8 characters" required/>
              <button type="button" class="pw-toggle" onclick="togglePw('pw','eyePw')"><span id="eyePw">👁</span></button>
            </div>
          </div>

          <div class="form-group">
            <label>Confirm Password</label>
            <div class="input-pw">
              <input type="password" name="confirm_password" id="pw2" placeholder="Repeat password" required/>
              <button type="button" class="pw-toggle" onclick="togglePw('pw2','eyePw2')"><span id="eyePw2">👁</span></button>
            </div>
          </div>

          <label class="checkbox-label">
            <input type="checkbox" required/> I agree to the <a href="#">Terms of Service</a> & <a href="#">Privacy Policy</a>
          </label>

          <button type="submit" class="btn-submit">Create My Account →</button>
        </form>

        <div class="auth-divider"><span>or continue with</span></div>
        <div class="social-btns">
          <button class="social-btn">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button class="social-btn">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Facebook
          </button>
        </div>
      </div>
    </div>

  </div>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
